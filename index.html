<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Yourself - AI Where's Waldo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Find Yourself</h1>
            <p>Take a photo and see if you can spot yourself in an AI-generated crowd!</p>
        </header>

        <div class="game-stage" id="photoStage">
            <div class="camera-section">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                
                <div class="camera-controls">
                    <button id="startCamera" class="btn btn-primary">📱 Start Camera</button>
                    <button id="takePhoto" class="btn btn-primary" style="display: none;">📸 Take Photo</button>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <button id="uploadPhoto" class="btn btn-secondary">📁 Upload Photo</button>
                </div>
                
                <div id="capturedPhoto" style="display: none;">
                    <img id="photoPreview" alt="Your photo">
                    <button id="proceedToGame" class="btn btn-primary">✨ Generate Waldo Scene</button>
                    <button id="retakePhoto" class="btn btn-secondary">🔄 Retake</button>
                </div>
            </div>
        </div>

        <div class="game-stage" id="loadingStage" style="display: none;">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <h2>🎨 AI is creating your scene...</h2>
                <p id="loadingText">Analyzing your photo and generating a crowded scene where you need to find yourself!</p>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="game-stage" id="gameStage" style="display: none;">
            <div class="game-header">
                <h2>🔍 Find Yourself in the Crowd!</h2>
                <p id="gameDescription">Click on yourself in the scene below</p>
                <div class="game-stats">
                    <span id="attempts">Attempts: 0</span>
                    <button id="giveHint" class="btn btn-hint">💡 Hint</button>
                    <button id="resetGame" class="btn btn-secondary">🔄 New Photo</button>
                </div>
            </div>
            
            <div class="game-area">
                <div id="waldoScene" class="waldo-scene">
                    <img id="generatedImage" alt="Find yourself in this scene">
                    <canvas id="gameCanvas"></canvas>
                </div>
            </div>
            
            <div id="gameResult" class="game-result" style="display: none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
